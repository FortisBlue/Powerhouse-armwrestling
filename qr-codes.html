<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Codes — Powerhouse Armwrestling</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@600;700&family=Barlow:wght@400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #fff;
    font-family: 'Barlow', sans-serif;
    padding: 40px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }
  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 0.1em;
    color: #0a0908;
    text-align: center;
  }
  .subtitle {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 20px;
    text-align: center;
  }
  .qr-grid {
    display: flex;
    gap: 48px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .qr-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    padding: 32px;
    border: 2px solid #0a0908;
    border-radius: 12px;
    background: #fff;
    width: 280px;
  }
  .qr-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 0.1em;
    color: #0a0908;
    text-align: center;
  }
  .qr-url {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.12em;
    color: #C9A234;
    text-align: center;
    word-break: break-all;
  }
  .qr-box {
    padding: 8px;
    background: #fff;
    border: 1px solid #e0e0e0;
    border-radius: 4px;
  }
  .gold-bar {
    width: 100%;
    height: 4px;
    background: #C9A234;
    border-radius: 2px;
    margin: 4px 0;
  }
  .club-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    letter-spacing: 0.16em;
    color: #888;
    text-align: center;
  }
  .print-hint {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #bbb;
    text-align: center;
    margin-top: 12px;
  }
  @media print {
    body { background: white; padding: 0; }
    .print-hint { display: none; }
    .qr-grid { gap: 40px; }
  }
</style>
</head>
<body>

<h1>POWERHOUSE ARMWRESTLING</h1>
<p class="subtitle">Scan codes for event use — print at A4</p>

<div class="qr-grid">

  <div class="qr-card">
    <div class="qr-label">Website</div>
    <div class="gold-bar"></div>
    <div class="qr-box" id="qr-home"></div>
    <div class="qr-url">powerhousearmwrestling.com.au</div>
    <div class="club-name">Find out more about the club</div>
  </div>

  <div class="qr-card">
    <div class="qr-label">Join Now</div>
    <div class="gold-bar"></div>
    <div class="qr-box" id="qr-membership"></div>
    <div class="qr-url">powerhousearmwrestling.com.au/membership</div>
    <div class="club-name">Become a member — $192/year</div>
  </div>

</div>

<p class="print-hint">Press Ctrl+P (or Cmd+P) to print — use "Fit to page" for best results</p>

<script>
  new QRCode(document.getElementById('qr-home'), {
    text: 'https://www.powerhousearmwrestling.com.au',
    width: 200,
    height: 200,
    colorDark: '#0a0908',
    colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.H
  });

  new QRCode(document.getElementById('qr-membership'), {
    text: 'https://www.powerhousearmwrestling.com.au/membership',
    width: 200,
    height: 200,
    colorDark: '#0a0908',
    colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.H
  });
</script>

</body>
</html>
